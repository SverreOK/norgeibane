# nginx server block for norgeibane.no — static site + optional proxy.
# Copy to /etc/nginx/sites-available/norgeibane.no and symlink into
# sites-enabled. Certbot rewrites this for HTTPS (see README).

server {
    listen 80;
    listen [::]:80;
    server_name norgeibane.no www.norgeibane.no;

    # Deployed site root (contains index.html, js/, css/, vendor/, data/)
    root /var/www/norgeibane;
    index index.html;

    # Long cache for the vendored libraries and Cesium's static assets —
    # they only change when you redeploy a new Cesium version.
    location /vendor/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for the bundled satellite snapshot (refreshed on deploys;
    # the browser fetches live TLEs from CelesTrak anyway).
    location /data/ {
        expires 1h;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # ── OPTIONAL: CelesTrak proxy (see proxy/proxy.mjs + README) ─────────
    # Uncomment if you run the proxy and set proxyBase in js/config.js.
    #location /celestrak {
    #    proxy_pass http://127.0.0.1:8021/;
    #    proxy_set_header Host $host;
    #}

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
