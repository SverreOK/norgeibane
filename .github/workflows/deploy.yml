name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5  # enables/validates Pages via the API
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run setup            # regenerates vendor/ and js/config.js from the example
      - run: npm run snapshot || true # refresh fallback data; non-fatal if CelesTrak is unreachable
      - run: touch .nojekyll          # keep Jekyll from processing Cesium's asset files
      - run: rm -rf node_modules .git # keep the Pages artifact to just the deployable site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deploy
        uses: actions/deploy-pages@v4
